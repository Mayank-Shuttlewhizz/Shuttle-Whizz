<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shuttlewhizz – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--s1:#13161d;--s2:#1c202b;--ac:#c8f135;--ac2:#35f1a8;--tx:#f0f2f5;--mu:#6b7280;--br:#252933;--rd:#ff4d6d;--ni:#7c6af7}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh}
.lscr{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:36px}
.lscr.hid{display:none}
.llogo{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--ac);margin-bottom:3px}
.lsub{font-size:11px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:36px}
.lcard{background:var(--s1);border:1.5px solid var(--br);border-radius:18px;padding:24px 22px;width:100%;max-width:320px}
.lcard h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:18px}
.li{width:100%;padding:12px 14px;background:var(--s2);border:1.5px solid var(--br);border-radius:9px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;margin-bottom:12px;transition:border-color .2s}
.li:focus{outline:none;border-color:var(--ac)}
.lbtn{width:100%;padding:13px;background:var(--ac);border:none;border-radius:11px;font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;color:#000;cursor:pointer}
.lerr{color:var(--rd);font-size:12px;margin-top:9px;text-align:center;display:none}
.hdr{background:var(--s1);border-bottom:1px solid var(--br);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--ac);line-height:1}
.logo-s{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1px}
.lgout{padding:6px 12px;border-radius:18px;border:1.5px solid var(--br);background:transparent;color:var(--mu);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.strow{display:flex;gap:9px;padding:14px 18px;overflow-x:auto;scrollbar-width:none}
.strow::-webkit-scrollbar{display:none}
.stc{flex-shrink:0;background:var(--s1);border:1.5px solid var(--br);border-radius:13px;padding:12px 16px;min-width:100px}
.stn{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--ac);line-height:1}
.stl{font-size:9px;color:var(--mu);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.fils{padding:0 18px 10px;display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:5px 11px;border-radius:16px;border:1.5px solid var(--br);background:transparent;color:var(--mu);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.fb.on{background:var(--ac);border-color:var(--ac);color:#000}
.sh{padding:3px 18px 9px;display:flex;align-items:center;justify-content:space-between}
.sh h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.exbtn{padding:5px 12px;border-radius:16px;background:var(--s1);border:1.5px solid var(--br);color:var(--mu);font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.blist{padding:0 18px 100px}
.bcard{background:var(--s1);border:1.5px solid var(--br);border-radius:13px;padding:14px;margin-bottom:9px;transition:border-color .2s}
.bcard:hover{border-color:var(--ac)}
.bt{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px}
.bn{font-size:15px;font-weight:700}
.bph{font-size:11px;color:var(--mu);margin-top:2px}
.bpr{font-size:16px;font-weight:700;color:var(--ac);text-align:right}
.bco{font-size:10px;color:var(--mu);text-align:right;margin-top:1px}
.bref{font-size:10px;color:var(--ac2);text-align:right;margin-top:1px;font-weight:600}
.bdet{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.btg{padding:3px 9px;border-radius:7px;font-size:10px;font-weight:600;background:var(--s2);border:1px solid var(--br);color:var(--mu)}
.btg.day{border-color:rgba(200,241,53,.3);color:var(--ac)}
.btg.night{border-color:rgba(124,106,247,.3);color:var(--ni)}
.btg.weekend{border-color:rgba(53,241,168,.3);color:var(--ac2)}
.btxn{background:var(--s2);border-radius:7px;padding:7px 11px;font-size:11px;color:var(--mu);display:flex;align-items:center;justify-content:space-between}
.btv{color:var(--tx);font-weight:600;font-size:12px;word-break:break-all;flex:1}
.cpbtn{flex-shrink:0;margin-left:7px;padding:3px 9px;border-radius:5px;border:1px solid var(--br);background:transparent;color:var(--mu);font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.bts{font-size:10px;color:var(--mu);margin-top:7px}
.mt2{text-align:center;padding:50px 18px;color:var(--mu)}
.spn{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--ac);border-radius:50%;animation:spin .55s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.copy-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ac);color:#000;font-weight:700;font-size:13px;padding:8px 20px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999}
.copy-toast.show{opacity:1}
</style>
</head>
<body>

<div class="lscr" id="lScr">
  <div class="llogo">Shuttlewhizz</div>
  <div class="lsub">Admin Panel</div>
  <div class="lcard">
    <h2>🔐 Admin Login</h2>
    <input class="li" type="password" id="aPass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">LOGIN</button>
    <div class="lerr" id="lErr">Incorrect password. Try again.</div>
  </div>
</div>

<div id="aUI" style="display:none">
  <div class="hdr">
    <div><div class="logo">Admin Panel</div><div class="logo-s">Shuttlewhizz · All Courts · April 2026</div></div>
    <button class="lgout" onclick="doLogout()">Logout</button>
  </div>

  <div class="strow">
    <div class="stc"><div class="stn" id="stTotal">0</div><div class="stl">Total Bookings</div></div>
    <div class="stc"><div class="stn" id="stRev">₹0</div><div class="stl">Revenue</div></div>
    <div class="stc"><div class="stn" id="stBan">0</div><div class="stl">Bandra</div></div>
    <div class="stc"><div class="stn" id="stSan">0</div><div class="stl">Santacruz</div></div>
    <div class="stc"><div class="stn" id="stOth">0</div><div class="stl">Others</div></div>
  </div>

  <div class="fils" id="filterRow">
    <button class="fb on" onclick="setF('all',this)">All</button>
    <button class="fb" onclick="setF('bandra',this)">Bandra</button>
    <button class="fb" onclick="setF('santacruz',this)">Santacruz</button>
    <button class="fb" onclick="setF('chembur',this)">Chembur</button>
    <button class="fb" onclick="setF('colaba',this)">Colaba</button>
    <button class="fb" onclick="setF('andheri',this)">Andheri</button>
    <button class="fb" onclick="setF('Mon',this)">Mon</button>
    <button class="fb" onclick="setF('Tue',this)">Tue</button>
    <button class="fb" onclick="setF('Wed',this)">Wed</button>
    <button class="fb" onclick="setF('Thu',this)">Thu</button>
    <button class="fb" onclick="setF('Fri',this)">Fri</button>
    <button class="fb" onclick="setF('Sat',this)">Sat</button>
    <button class="fb" onclick="setF('Sun',this)">Sun</button>
  </div>

  <div class="sh">
    <h3 id="resCount">Bookings</h3>
    <button class="exbtn" onclick="doExport()">📥 Export CSV</button>
  </div>
  <div class="blist" id="bList"><div class="mt2"><span class="spn"></span></div></div>
</div>

<div class="copy-toast" id="cToast">Copied!</div>

<script>
var PASS = 'shuttlewhizz2026';
var all = [], filt = 'all';

function doLogin() {
  if (document.getElementById('aPass').value === PASS) {
    document.getElementById('lScr').classList.add('hid');
    document.getElementById('aUI').style.display = 'block';
    loadData();
  } else {
    document.getElementById('lErr').style.display = 'block';
    document.getElementById('aPass').value = '';
  }
}
function doLogout() {
  document.getElementById('lScr').classList.remove('hid');
  document.getElementById('aUI').style.display = 'none';
  document.getElementById('aPass').value = '';
}

function loadData() {
  try { var raw=JSON.parse(localStorage.getItem('sw_bk')||'{}'); all=Object.values(raw); } catch(e) { all=[]; }
  all.sort(function(a,b){return new Date(b.ts||0)-new Date(a.ts||0);});
  render();
}

function setF(f,el) {
  filt=f;
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  render();
}

var DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
function filtered() {
  if (filt==='all') return all;
  if (DAYS.indexOf(filt)>-1) return all.filter(function(b){return b.day===filt;});
  return all.filter(function(b){return b.courtId===filt;});
}

function render() {
  var list=filtered();
  var rev=all.reduce(function(s,b){return s+(b.price||0);},0);
  document.getElementById('stTotal').textContent=all.length;
  document.getElementById('stRev').textContent='₹'+rev.toLocaleString('en-IN');
  document.getElementById('stBan').textContent=all.filter(function(b){return b.courtId==='bandra';}).length;
  document.getElementById('stSan').textContent=all.filter(function(b){return b.courtId==='santacruz';}).length;
  document.getElementById('stOth').textContent=all.filter(function(b){return['chembur','colaba','andheri'].indexOf(b.courtId)>-1;}).length;
  document.getElementById('resCount').textContent=list.length+' Booking'+(list.length!==1?'s':'');

  var el=document.getElementById('bList');
  if (!list.length) { el.innerHTML='<div class="mt2">📭 No bookings yet</div>'; return; }

  el.innerHTML=list.map(function(b){
    var rl=b.rate==='night'?'🌙 Night':b.rate==='weekend'?'🟢 Weekend':'☀️ Day';
    var tv=b.txn&&b.txn!=='N/A'?b.txn:'Not provided';
    return '<div class="bcard">'
      +'<div class="bt">'
        +'<div><div class="bn">'+e(b.name||'—')+'</div><div class="bph">📞 '+e(b.phone||'—')+'</div></div>'
        +'<div><div class="bpr">₹'+(b.price||0).toLocaleString('en-IN')+'</div><div class="bco">'+e(b.court||'—')+'</div>'+(b.ref?'<div class="bref">'+e(b.ref)+'</div>':'')+'</div>'
      +'</div>'
      +'<div class="bdet">'
        +'<span class="btg">'+e(b.day||'')+' '+e(b.date||'')+'</span>'
        +'<span class="btg">'+e(b.time||'—')+'</span>'
        +'<span class="btg '+(b.rate||'day')+'">'+rl+'</span>'
      +'</div>'
      +'<div class="btxn">'
        +'<div style="flex:1"><div style="font-size:9px;color:var(--mu);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">UPI Transaction ID</div>'
        +'<div class="btv">'+e(tv)+'</div></div>'
        +(b.txn&&b.txn!=='N/A'?'<button class="cpbtn" onclick="cp(\''+e(b.txn)+'\')">Copy</button>':'')
      +'</div>'
      +'<div class="bts">Booked: '+e(b.tsd||b.ts||'—')+'</div>'
      +'</div>';
  }).join('');
}

function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function cp(t){
  if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){toast();});
  else{var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast();}
}
function toast(){var t=document.getElementById('cToast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1800);}

function doExport(){
  var rows=[['Ref','Name','Phone','Court','Day','Date','Time','Rate','Price (₹)','Transaction ID','Booked At']];
  filtered().forEach(function(b){
    rows.push([b.ref||'',b.name||'',b.phone||'',b.court||'',b.day||'',b.date||'',b.time||'',b.rate||'',b.price||0,b.txn||'',b.tsd||b.ts||'']);
  });
  var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='shuttlewhizz-bookings-apr2026.csv';a.click();
}

setInterval(function(){if(document.getElementById('aUI').style.display!=='none')loadData();},30000);
</script>
</body>
</html>
